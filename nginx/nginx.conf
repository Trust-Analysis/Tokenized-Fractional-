events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # JSON log format for log aggregation (ELK / Filebeat)
    log_format json escape=json '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request_method":"$request_method",'
        '"request_uri":"$request_uri",'
        '"server_protocol":"$server_protocol",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_response_time":"$upstream_response_time",'
        '"log_format":"json"'
    '}';

    access_log /var/log/nginx/access.log json;
    error_log /var/log/nginx/error.log;

    # Rate limiting zone for API requests: 10 requests per second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    
    # Connection limiting zone for DDoS protection: Max 50 connections per IP
    limit_conn_zone $binary_remote_addr zone=addr_limit:10m;

    # Security headers
    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # ── HTTP server (redirects to HTTPS in production) ────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Basic DDoS protection at the server level
        limit_conn addr_limit 50;

        # Block common suspicious user agents (basic WAF rule)
        if ($http_user_agent ~* (sqlmap|nikto|nmap|masscan|zmap)) {
            return 403;
        }

        # Block common SQL injection patterns in URL (basic WAF rule)
        if ($query_string ~* "union.*select.*\(") {
            return 403;
        }
        if ($query_string ~* "concat.*\(") {
            return 403;
        }

        # If a real domain is configured, redirect HTTP → HTTPS
        if ($host != "localhost") {
            return 301 https://$host$request_uri;
        }

        # Proxy /api requests to the Express backend
        location /api/ {
            # Apply rate limiting to API endpoints
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Forward real IP
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Proxy all other requests to the Vite frontend
        location / {
            proxy_pass http://127.0.0.1:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ── HTTPS server (enabled when SSL certificate is installed) ────────────────
    # Uncomment and configure the ssl_* paths after running scripts/setup-ssl.sh.
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    #     ssl_trusted_certificate /etc/letsencrypt/live/your-domain.com/chain.pem;
    #
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #     ssl_session_tickets off;
    #
    #     ssl_stapling on;
    #     ssl_stapling_verify on;
    #     resolver 1.1.1.1 8.8.8.8 valid=300s;
    #     resolver_timeout 5s;
