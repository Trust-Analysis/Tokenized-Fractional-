groups:
  - name: rwa_marketplace
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP error rate ({{ $value | humanizePercentage }})"
          description: "Error rate is above 5% for the last 5 minutes."

      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p99 latency ({{ $value }}s)"
          description: "p99 latency is above 2s for the last 5 minutes."

      - alert: ServiceDown
        expr: up{job="backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend service is down"
          description: "The backend service has been unreachable for more than 1 minute."

      - alert: RateLimitThreshold
        expr: rate(http_requests_total{status="429"}[5m]) > 0.33
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High rate limit hit rate ({{ $value | humanizePercentage }})"
          description: "More than 1 rate-limited request every 3 seconds on average."

      - alert: CertificateExpiring
        expr: certificate_expiry_days < 30
        labels:
          severity: warning
        annotations:
          summary: "SSL certificate expires in {{ $value }} days"
          description: "Renew the SSL certificate soon."

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / 1024 / 1024 > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage ({{ $value | humanize }}MB)"
          description: "Memory usage is above 500MB."
