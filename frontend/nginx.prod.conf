server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed assets when available
    gzip_static on;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|woff2?|png|jpg|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
