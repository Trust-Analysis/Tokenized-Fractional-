apiVersion: v1
kind: Secret
metadata:
  name: rwa-backend-secrets
  namespace: rwa-marketplace
  labels:
    app: rwa-backend
    component: secrets
type: Opaque
# Values must be base64-encoded. Example:
#   echo -n 'your-secret-value' | base64
# Replace the placeholder values below with your actual base64-encoded secrets.
stringData:
  ADMIN_API_KEY: "REPLACE_WITH_STRONG_RANDOM_KEY"
---
apiVersion: v1
kind: Secret
metadata:
  name: rwa-frontend-secrets
  namespace: rwa-marketplace
  labels:
    app: rwa-frontend
    component: secrets
type: Opaque
# Replace the placeholder values below with your actual base64-encoded secrets.
stringData:
  VITE_CONTRACT_ID: "REPLACE_WITH_YOUR_CONTRACT_ID"
