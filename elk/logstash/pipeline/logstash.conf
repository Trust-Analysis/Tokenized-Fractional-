input {
  beats {
    port => 5044
    ssl => false
  }
}

filter {
  # Drop health check noise
  if [json]?[req]?[url] == "/health" {
    drop { }
  }

  # ---- Parse nginx JSON access logs ----
  if [source] =~ "access" or [json]?[log_format] == "json" {
    if [json]?[message] {
      json {
        source => "[json][message]"
        target => "nginx"
        skip_on_invalid_json => true
      }
    }

    if [nginx]?[time_local] {
      date {
        match => ["[nginx][time_local]", "dd/MMM/yyyy:HH:mm:ss Z"]
        target => "@timestamp"
      }
    }

    mutate {
      copy => { "[nginx][status]" => "[http][response][status_code]" }
      copy => { "[nginx][request_method]" => "[http][request][method]" }
      copy => { "[nginx][request_uri]" => "[url][original]" }
      copy => { "[nginx][body_bytes_sent]" => "[http][response][bytes]" }
      copy => { "[nginx][http_user_agent]" => "[user_agent][original]" }
      copy => { "[nginx][http_referer]" => "[http][request][referrer]" }
    }

    mutate {
      convert => { "[http][response][status_code]" => "integer" }
      convert => { "[http][response][bytes]" => "integer" }
    }

    mutate {
      add_tag => ["nginx_log"]
    }
  }

  # ---- Parse Pino structured JSON logs (backend) ----
  if [json]?[level] or [json]?[msg] {
    mutate {
      copy => { "[json][level]" => "[log][level]" }
      copy => { "[json][msg]" => "[message]" }
      copy => { "[json][req]" => "[http][request]" }
      copy => { "[json][res]" => "[http][response]" }
      copy => { "[json][responseTime]" => "[http][response][response_time_ms]" }
      copy => { "[json][err]" => "[error]" }
    }

    if [json][req]?[method] {
      mutate {
        copy => { "[json][req][method]" => "[http][request][method]" }
        copy => { "[json][req][url]" => "[url][original]" }
      }
    }

    if [json][res]?[statusCode] {
      mutate {
        copy => { "[json][res][statusCode]" => "[http][response][status_code]" }
        convert => { "[http][response][status_code]" => "integer" }
      }
    }

    if [json][name] == "sentry" or [json][name] == "transaction" {
      mutate {
        add_tag => ["sentry_log"]
      }
    } else {
      mutate {
        add_tag => ["backend_log"]
      }
    }
  }

  # ---- Add ECs compliant fields ----
  mutate {
    add_field => {
      "[event][dataset]" => "%{[docker][container][name]}"
      "[service][name]" => "%{[docker][container][name]}"
      "[service][type]" => "docker"
    }
  }

  # ---- Cleanup ----
  mutate {
    remove_field => ["[json][req]", "[json][res]", "[json][err]"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "rwa-logs-%{+YYYY.MM.dd}"
    manage_template => false
    ilm_enabled => false
  }
}
